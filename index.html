<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生日快乐 🎂</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="stage">
    <div class="confetti" aria-hidden="true"></div>

    <section class="card">
      <p class="kicker">致我最亲爱的妹妹</p>
      <h1>生日快乐 🎂</h1>
      <p class="message">
        愿你的每一天都被温柔以待，<br />
        所有的愿望都能慢慢实现。
      </p>

      <button id="wishBtn" class="wish-btn" type="button">许个愿 ✨</button>
      <p id="wishText" class="wish-text" hidden></p>
    </section>
  </main>

  <script src="/main.js" defer></script>
</body>
</html>
